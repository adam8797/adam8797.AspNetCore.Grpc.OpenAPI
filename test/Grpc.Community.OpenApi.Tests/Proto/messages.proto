syntax = "proto3";

import "google/api/annotations.proto";
import "google/protobuf/wrappers.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/any.proto";

package messages;

message HelloRequest {
  message SubMessage {
    string subfield = 1;
    repeated string subfields = 2;
  }
  message DataTypes {
    enum NestedEnum {
      NESTED_ENUM_UNSPECIFIED = 0;
      FOO = 1;
      BAR = 2;
      BAZ = 3;
      NEG = -1;  // Intentionally negative.
    }
    message NestedMessage {
      string subfield = 1;
    }
    int32 single_int32 = 1;
    int64 single_int64 = 2;
    uint32 single_uint32 = 3;
    uint64 single_uint64 = 4;
    sint32 single_sint32 = 5;
    sint64 single_sint64 = 6;
    fixed32 single_fixed32 = 7;
    fixed64 single_fixed64 = 8;
    sfixed32 single_sfixed32 = 9;
    sfixed64 single_sfixed64 = 10;
    float single_float = 11;
    double single_double = 12;
    bool single_bool = 13;
    string single_string = 14;
    bytes single_bytes = 15;
    NestedEnum single_enum = 16;
    NestedMessage single_message = 17;
  }
  message Wrappers {
    google.protobuf.StringValue string_value = 1;
    google.protobuf.Int32Value int32_value = 2;
    google.protobuf.Int64Value int64_value = 3;
    google.protobuf.FloatValue float_value = 4;
    google.protobuf.DoubleValue double_value = 5;
    google.protobuf.BoolValue bool_value = 6;
    google.protobuf.UInt32Value uint32_value = 7;
    google.protobuf.UInt64Value uint64_value = 8;
    google.protobuf.BytesValue bytes_value = 9;
  }
  string name = 1;
  SubMessage sub = 2;
  DataTypes data = 3;
  Wrappers wrappers = 4;
  repeated string repeated_strings = 5;
}

message HelloReply {
  string message = 1;
  repeated string values = 2;
}

message StringWrapper {
  google.protobuf.StringValue string_value = 1;
}

message RecursiveMessage {
  RecursiveMessage child = 1;
}

message BytesMessage {
  bytes bytes_value = 1;
  google.protobuf.BytesValue bytes_nullable_value = 2;
}

message EnumMessage {
  enum NestedEnum {
    NESTED_ENUM_UNSPECIFIED = 0;
    FOO = 1;
    BAR = 2;
    BAZ = 3;
    NEG = -1;  // Intentionally negative.
  }
  NestedEnum enum_value = 1;
}

message OneOfMessage {
  oneof First {
    string first_one = 1;
    string first_two = 2;
  }
  oneof Second {
    string second_one = 3;
    string second_two = 4;
  }
}

message MapMessage {
  map<string, double> map_value = 1;
}

message FieldMaskMessage {
  google.protobuf.FieldMask field_mask_value = 1;
}

enum EnumWithoutMessage {
  ENUM_WITHOUT_MESSAGE_UNSPECIFIED = 0;
  ENUM_WITHOUT_MESSAGE_FOO = 1;
  ENUM_WITHOUT_MESSAGE_BAR = 2;
  ENUM_WITHOUT_MESSAGE_BAZ = 3;
  ENUM_WITHOUT_MESSAGE_NEG = -1;  // Intentionally negative.
}

// Holds the types that cannot be an RPC request on their own - a top level enum -
// or that are only meaningful as a field, so that they reach the generated document.
message WellKnownHolder {
  EnumWithoutMessage enum_without_message = 1;
  google.protobuf.Any any_value = 2;
  google.protobuf.StringValue string_value = 3;
  // Struct, ListValue and Value are mutually recursive.
  google.protobuf.Struct struct_value = 4;
  google.protobuf.ListValue list_value = 5;
}

message SchemaResponse {
  string message = 1;
}

// Exposes each message under test as a request body so that its schema is emitted
// into the OpenAPI document's components.
service Messages {
  rpc PostEnumMessage (EnumMessage) returns (SchemaResponse) {
    option (google.api.http) = { post: "/v1/messages/enum", body: "*" };
  }
  rpc PostHelloReply (HelloReply) returns (SchemaResponse) {
    option (google.api.http) = { post: "/v1/messages/helloreply", body: "*" };
  }
  rpc PostBytesMessage (BytesMessage) returns (SchemaResponse) {
    option (google.api.http) = { post: "/v1/messages/bytes", body: "*" };
  }
  rpc PostOneOfMessage (OneOfMessage) returns (SchemaResponse) {
    option (google.api.http) = { post: "/v1/messages/oneof", body: "*" };
  }
  rpc PostMapMessage (MapMessage) returns (SchemaResponse) {
    option (google.api.http) = { post: "/v1/messages/map", body: "*" };
  }
  rpc PostFieldMaskMessage (FieldMaskMessage) returns (SchemaResponse) {
    option (google.api.http) = { post: "/v1/messages/fieldmask", body: "*" };
  }
  rpc PostWellKnownHolder (WellKnownHolder) returns (SchemaResponse) {
    option (google.api.http) = { post: "/v1/messages/wellknown", body: "*" };
  }
}

// Kept in its own service: a self-referencing message cannot be represented, and
// generating a document containing one throws. See RecursiveMessageTests.
service RecursiveMessages {
  rpc PostRecursiveMessage (RecursiveMessage) returns (SchemaResponse) {
    option (google.api.http) = { post: "/v1/recursive", body: "*" };
  }
}
