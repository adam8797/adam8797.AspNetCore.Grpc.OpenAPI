name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CONFIGURATION: Release
  SOLUTION: Community.Grpc.OpenApi.slnx
  PACKAGE_PROJECT: src/Community.Grpc.SwaggerGen/Community.Grpc.SwaggerGen.csproj

jobs:
  build:
    name: Build, test & pack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} -c ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION }} -c ${{ env.CONFIGURATION }} --no-build

      - name: Compute package version
        id: version
        shell: bash
        run: |
          # A tag or GitHub Release named "v1.2.3" packs as version 1.2.3.
          # Every other build gets a throwaway CI prerelease version.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="1.0.0-ci.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Pack
        run: dotnet pack ${{ env.PACKAGE_PROJECT }} -c ${{ env.CONFIGURATION }} -p:Version=${{ steps.version.outputs.version }} -o ${{ github.workspace }}/artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Community.Grpc.SwaggerGen.${{ steps.version.outputs.version }}.nupkg
          path: artifacts/*.nupkg
          if-no-files-found: error

  publish:
    name: Publish to NuGet.org
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' }}
    environment: nuget
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet.org
        run: dotnet nuget push "artifacts/*.nupkg" --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
